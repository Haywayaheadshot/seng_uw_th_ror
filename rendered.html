<div class="min-h-screen bg-gray-100">
  <header class="bg-blue-600 text-white p-4">
    <h1 class="text-2xl font-bold text-center md:text-left">Budget Categories</h1>
  </header>
  <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    <div class="mb-4 flex flex-col sm:flex-row sm:items-center sm:space-x-4">
      <form class="flex-1" action="/admin/budget_categories" accept-charset="UTF-8" method="get">
        <div class="flex flex-col sm:flex-row sm:space-x-4">
          <input placeholder="Search by category name" class="w-full sm:w-1/2 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="search" id="search" />
          <select class="w-full sm:w-1/2 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" name="budget_cycle_id" id="budget_cycle_id"><option value="">Select Budget Cycle (default: latest)</option>
<option value="77">2024 Cycle</option>
<option value="78">2025 Cycle</option></select>
          <input type="submit" name="commit" value="Search" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 mt-2 sm:mt-0 sm:w-auto" data-disable-with="Search" />
        </div>
</form>      <a class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 mt-2 sm:mt-0" href="/admin/budget_categories/new">New Category</a>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full bg-white shadow-md rounded-lg">
        <thead>
          <tr class="bg-gray-200">
            <th class="py-2 px-4 text-left">Name</th>
            <th class="py-2 px-4 text-left">Spending Limit (%)</th>
            <th class="py-2 px-4 text-left">Utilization (%)</th>
            <th class="py-2 px-4 text-left">Actions</th>
          </tr>
        </thead>
        <tbody>
            <tr class="border-b ">
              <td class="py-2 px-4">Infrastructure</td>
              <td class="py-2 px-4">40.0</td>
              <td class="py-2 px-4">
                <div class="w-full bg-gray-200 rounded-full h-2.5" role="progressbar" aria-valuenow="20.0" aria-valuemin="0" aria-valuemax="100" title="Allocated: $200,000.0">
                  <div class="h-2.5 rounded-full bg-blue-500" style="width: 20.0%"></div>
                </div>
                <span class="text-sm text-gray-600">20.0%</span>
              </td>
              <td class="py-2 px-4 flex space-x-2">
                <a class="text-blue-500 hover:underline" href="/admin/budget_categories/122/edit">Edit</a>
                <a data-turbo-method="delete" data-turbo-confirm="Are you sure? This will also delete 1 associated budget(s)." class="text-red-500 hover:underline" href="/admin/budget_categories/122">Delete</a>
              </td>
            </tr>
            <tr class="border-b ">
              <td class="py-2 px-4">Social Programs</td>
              <td class="py-2 px-4">30.0</td>
              <td class="py-2 px-4">
                <div class="w-full bg-gray-200 rounded-full h-2.5" role="progressbar" aria-valuenow="0.0" aria-valuemin="0" aria-valuemax="100" title="Allocated: $0.0">
                  <div class="h-2.5 rounded-full bg-blue-500" style="width: 0.0%"></div>
                </div>
                <span class="text-sm text-gray-600">0.0%</span>
              </td>
              <td class="py-2 px-4 flex space-x-2">
                <a class="text-blue-500 hover:underline" href="/admin/budget_categories/123/edit">Edit</a>
                <a data-turbo-method="delete" data-turbo-confirm="Are you sure? This will also delete 0 associated budget(s)." class="text-red-500 hover:underline" href="/admin/budget_categories/123">Delete</a>
              </td>
            </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
